<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Unit | Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-table input[type="number"] { background: rgba(0,0,0,0.3); border: 1px solid #333; color: #06d6a0; padding: 5px; width: 80px; font-family: monospace; font-weight: bold; }
        .team-card { transition: transform 0.2s; background:#161b22; border:1px solid #333; padding:15px; border-radius:4px; display: flex; flex-direction: column; justify-content: space-between; }
        .team-card:hover { border-color: #4cc9f0 !important; transform: translateY(-2px); }
        .btn-kick { color: #ef476f; background: none; border: none; cursor: pointer; font-weight: bold; margin-left: 10px; font-size: 0.8rem; }
        .btn-kick:hover { text-decoration: underline; }
        .btn-terminate { background: #ef476f; color: white; border: none; padding: 5px; margin-top: 10px; cursor: pointer; font-size: 0.7rem; font-weight: bold; border-radius: 2px; }
        .btn-perm { background: #ffd166; color: #000; border: none; padding: 5px 10px; font-size: 0.7rem; font-weight: bold; cursor: pointer; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <header>
            <h1>Master Control Unit</h1>
            <p>Overseer Synchronization Active</p>
        </header>

        <section style="border: 1px solid #4361ee; background: rgba(67, 97, 238, 0.05); margin-bottom: 30px; padding: 20px; border-radius: 8px;">
            <h2 style="color: #4cc9f0; margin-top: 0; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase;">Broadcast Command Console</h2>
            <div style="display: grid; grid-template-columns: 1fr 200px; gap: 20px;">
                <div>
                    <input type="text" id="global-msg" placeholder="Enter message for selected entities..." style="width: 100%; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid #4361ee; color: white; padding: 10px;">
                    <div style="display: flex; gap: 20px; align-items: center;">
                        <label style="color: #e2e8f0; font-size: 0.8rem;">SIGNAL TYPE:</label>
                        <label style="color: #4cc9f0; cursor: pointer; font-size: 0.8rem;"><input type="radio" name="msg-type" value="blue" checked> INTEL (BLUE)</label>
                        <label style="color: #ef476f; cursor: pointer; font-size: 0.8rem;"><input type="radio" name="msg-type" value="red"> ALERT (RED)</label>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; justify-content: center;">
                    <button class="btn-new" onclick="sendGlobalBroadcast()" style="padding: 12px; font-weight: bold;">EXECUTE BROADCAST</button>
                </div>
            </div>
        </section>

        <section id="admin-teams" style="margin-bottom: 40px; padding: 20px; background: rgba(0,0,0,0.2); border: 1px solid #333;">
            <h2 style="color: #4cc9f0; text-transform: uppercase; letter-spacing: 2px; margin-top:0;">Global Squad Oversight</h2>
            <div id="admin-team-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;"></div>
        </section>

        <div class="admin-stats">
            <div class="stat-card"><h3>Pending</h3><span id="count-pending">0</span></div>
            <div class="stat-card"><h3>Verified</h3><span id="count-verified">0</span></div>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="select-all" onclick="toggleSelectAll(this)"></th>
                    <th>Identifier</th>
                    <th>Requested Class</th>
                    <th>Credits (₵)</th>
                    <th>Status</th>
                    <th>Command</th>
                </tr>
            </thead>
            <tbody id="player-list"></tbody>
        </table>

        <div class="button-group" style="margin-top: 40px; text-align: center;">
            <a href="index.html" class="btn btn-player">Disconnect from System</a>
        </div>
    </div>

    <div id="perm-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div style="background: #161b22; border: 2px solid #ffd166; padding: 25px; width: 90%; max-width: 400px; border-radius: 8px;">
            <h3 style="color: #ffd166; margin-top: 0; text-align: center; letter-spacing: 2px;">VISIBILITY CONTROL</h3>
            <p id="perm-player-name" style="color: #8b949e; text-align: center; font-size: 0.9rem; margin-bottom: 20px;"></p>
            <div id="perm-list" style="display: grid; gap: 12px; margin-bottom: 25px;">
                <label style="color: #eee; cursor: pointer; display: flex; align-items: center; gap: 10px;"><input type="checkbox" id="p-stats"> Vital Stats</label>
                <label style="color: #eee; cursor: pointer; display: flex; align-items: center; gap: 10px;"><input type="checkbox" id="p-missions"> Mission Log</label>
                <label style="color: #eee; cursor: pointer; display: flex; align-items: center; gap: 10px;"><input type="checkbox" id="p-skills"> Skills & Abilities</label>
                <label style="color: #eee; cursor: pointer; display: flex; align-items: center; gap: 10px;"><input type="checkbox" id="p-inventory"> Inventory & Loot</label>
                <label style="color: #eee; cursor: pointer; display: flex; align-items: center; gap: 10px;"><input type="checkbox" id="p-chronicles"> Player Chronicles</label>
                <label style="color: #eee; cursor: pointer; display: flex; align-items: center; gap: 10px;"><input type="checkbox" id="p-team"> Team Hall</label>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="savePermissions()" style="flex: 1; background: #ffd166; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer;">UPDATE ACCESS</button>
                <button onclick="closePerms()" style="flex: 1; background: transparent; color: #8b949e; border: 1px solid #333; padding: 10px; cursor: pointer;">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="chat-monitor" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width: 80%; height: 80%; background: #0d1117; border: 2px solid #4cc9f0; z-index: 10000; padding: 20px; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,1);">
        <div style="display:flex; justify-content:space-between; margin-bottom: 15px;">
            <h3 id="monitor-team-name" style="color: #4cc9f0; margin:0;">INTERCEPTING...</h3>
            <button onclick="closeMonitor()" style="background:none; border:1px solid #ef476f; color:#ef476f; cursor:pointer; padding: 5px 15px;">CLOSE</button>
        </div>
        <div id="monitor-messages" style="flex:1; overflow-y:auto; background:rgba(0,0,0,0.3); padding:15px; font-family:monospace; border: 1px solid #222; margin-bottom: 15px; line-height: 1.6;"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="admin-chat-input" placeholder="Speak as OVERSEER..." style="flex:1; background:#161b22; border:1px solid #333; color:white; padding:10px;">
            <button onclick="adminSendMessage()" style="background:#4cc9f0; color:#0d1117; border:none; padding:0 20px; font-weight:bold; cursor:pointer;">SEND</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://ijksxcqbecobagkbvghm.supabase.co';
        const supabaseKey = 'sb_publishable_Z2SYmoDOGNRe8zqAdjGymg_xHzXh1QA';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let players = [];
        let activeMonitoringTeam = null;
        let currentEditingId = null;

        async function fetchPlayers() {
            const { data, error } = await _supabase.from('players').select('*').order('name', { ascending: true });
            if (error) return;
            players = data || [];
            renderTable();
            loadAllTeams();
        }

        function renderTable() {
            const list = document.getElementById('player-list');
            list.innerHTML = players.map(p => {
                const safeId = String(p.id);
                const safeName = p.name.replace(/'/g, "\\'");
                const statusClass = (p.status || 'pending').toLowerCase();
                
                let actionButtons = (p.status === "Verified" || p.status === "DECEASED") 
                    ? `<button class="btn-perm" onclick="managePermissions('${safeId}', '${safeName}')">PERMS</button><button class="btn-access" onclick="accessSheet('${safeId}')">Sheet</button>`
                    : `<button class="approve" onclick="accessSheet('${safeId}')">Verify</button><button class="delete" onclick="purge('${safeId}')">Purge</button>`;

                return `<tr>
                    <td><input type="checkbox" class="player-selector" value="${safeId}"></td>
                    <td><strong>${p.name}</strong><br><small style="color:#4361ee">ID: ${safeId.substring(0,8)}</small></td>
                    <td><div style="color:#4cc9f0; font-size:0.7rem">${p.requestClass || '---'}</div></td>
                    <td><input type="number" value="${p.credits || 0}" onchange="updatePlayerCredits('${safeId}', this.value)"></td>
                    <td><span class="status ${statusClass}">${p.status}</span></td>
                    <td>${actionButtons}</td>
                </tr>`;
            }).join('');
            updateCounters();
        }

        async function loadAllTeams() {
            const { data: teams } = await _supabase.from('teams').select('*');
            const container = document.getElementById('admin-team-list');
            container.innerHTML = "";
            if(!teams) return;

            for (const team of teams) {
                const { data: members } = await _supabase.from('players').select('name, id').in('id', team.members);
                const card = document.createElement('div');
                card.className = "team-card";
                card.innerHTML = `
                    <div>
                        <h4 style="color:#4cc9f0; margin:0 0 10px 0; text-transform:uppercase;">${team.name}</h4>
                        <div style="font-size:0.8rem; color:#8b949e;">
                            ${(members || []).map(m => `
                                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                    <span>${m.name}</span>
                                    <button class="btn-kick" onclick="kickFromTeam('${team.id}', '${m.id}')">[X]</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div>
                        <button onclick='openMonitor(${JSON.stringify(team).replace(/'/g, "&apos;")})' style="width:100%; margin-top:15px; cursor:pointer; background:#4cc9f0; border:none; padding:5px; font-weight:bold;">MONITOR CHAT</button>
                        <button class="btn-terminate" onclick="deleteTeam('${team.id}')" style="width:100%">TERMINATE SQUAD</button>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        async function kickFromTeam(teamId, playerId) {
            if(!confirm("Eject player from team?")) return;
            const { data: team } = await _supabase.from('teams').select('members').eq('id', teamId).single();
            const updated = team.members.filter(id => id !== playerId);
            await _supabase.from('teams').update({ members: updated }).eq('id', teamId);
            loadAllTeams();
        }

        async function deleteTeam(teamId) {
            if(!confirm("PERMANENTLY DISBAND THIS SQUAD?")) return;
            await _supabase.from('teams').delete().eq('id', teamId);
            await _supabase.from('team_messages').delete().eq('team_id', teamId); // Cleanup chat
            loadAllTeams();
        }

        async function adminSendMessage() {
            const inp = document.getElementById('admin-chat-input');
            if(!inp.value || !activeMonitoringTeam) return;
            await _supabase.from('team_messages').insert({
                team_id: activeMonitoringTeam.id,
                sender_name: "OVERSEER",
                content: inp.value.toUpperCase()
            });
            inp.value = "";
            loadMonitorHistory();
        }

        function openMonitor(team) {
            activeMonitoringTeam = team;
            document.getElementById('monitor-team-name').innerText = `MONITORING: ${team.name}`;
            document.getElementById('chat-monitor').style.display = 'flex';
            loadMonitorHistory();
            // Subscribe to live messages
            _supabase.channel('admin_mon').on('postgres_changes', { event:'INSERT', schema:'public', table:'team_messages', filter:`team_id=eq.${team.id}` }, () => loadMonitorHistory()).subscribe();
        }

        async function loadMonitorHistory() {
            if(!activeMonitoringTeam) return;
            const { data } = await _supabase.from('team_messages').select('*').eq('team_id', activeMonitoringTeam.id).order('created_at', { ascending: true });
            const box = document.getElementById('monitor-messages'); 
            box.innerHTML = (data || []).map(m => `<div><b style="color:${m.sender_name === 'OVERSEER' ? '#ef476f' : '#4cc9f0'}">${m.sender_name}:</b> ${m.content}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        // PERMISSIONS & BROADCAST UTILS
        async function updatePlayerCredits(id, val) { await _supabase.from('players').update({ credits: parseInt(val) }).eq('id', id); }
        async function managePermissions(playerId, playerName) {
            currentEditingId = playerId;
            document.getElementById('perm-player-name').innerText = `ID: ${playerId}`;
            const { data } = await _supabase.from('players').select('permissions').eq('id', playerId).single();
            const perms = data?.permissions || { stats:true, missions:true, skills:true, inventory:true, chronicles:true, team:true };
            ['stats','missions','skills','inventory','chronicles','team'].forEach(k => document.getElementById(`p-${k}`).checked = perms[k] !== false);
            document.getElementById('perm-modal').style.display = 'flex';
        }
        async function savePermissions() {
            const newPerms = {};
            ['stats','missions','skills','inventory','chronicles','team'].forEach(k => newPerms[k] = document.getElementById(`p-${k}`).checked);
            await _supabase.from('players').update({ permissions: newPerms }).eq('id', currentEditingId);
            closePerms();
        }
        function closePerms() { document.getElementById('perm-modal').style.display = 'none'; }
        function closeMonitor() { document.getElementById('chat-monitor').style.display = 'none'; activeMonitoringTeam = null; }
        function toggleSelectAll(s) { document.querySelectorAll('.player-selector').forEach(c => c.checked = s.checked); }
        function accessSheet(id) { window.location.href = `player-sheet.html?id=${id}`; }
        
        async function sendGlobalBroadcast() {
    const msgInput = document.getElementById('global-msg');
    const msg = msgInput.value.trim();
    const type = document.querySelector('input[name="msg-type"]:checked').value;
    
    // Get all checked player IDs from the table
    const selected = Array.from(document.querySelectorAll('.player-selector:checked')).map(c => c.value);
    
    if (!msg) return alert("COMMAND ERROR: No message content.");
    if (selected.length === 0) return alert("COMMAND ERROR: No target entities selected.");

    console.log("Deploying signal to:", selected);

    // Update each selected player's record
    const { error } = await _supabase
        .from('players')
        .update({ 
            last_notif: msg, 
            notif_type: type, 
            notif_time: Date.now() // This acts as the "trigger" for the player's screen
        })
        .in('id', selected);

    if (error) {
        alert("BROADCAST FAILED: Database rejection.");
        console.error(error);
    } else {
        alert(`SIGNAL DEPLOYED: ${selected.length} entities notified.`);
        msgInput.value = "";
        // Uncheck all boxes after sending
        document.querySelectorAll('.player-selector').forEach(c => c.checked = false);
        document.getElementById('select-all').checked = false;
    }
}

        function updateCounters() {
            document.getElementById('count-pending').innerText = players.filter(p => p.status === "Pending").length;
            document.getElementById('count-verified').innerText = players.filter(p => p.status === "Verified").length;
        }

        fetchPlayers();
    </script>
</body>
</html>
