<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Unit | Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Table enhancements for Admin */
        .admin-table input[type="number"] {
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            color: #06d6a0;
            padding: 5px;
            width: 80px;
            font-family: monospace;
            font-weight: bold;
        }
        .team-card {
            transition: transform 0.2s;
        }
        .team-card:hover {
            border-color: #4cc9f0 !important;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <header>
            <h1>Master Control Unit</h1>
            <p>Overseer Synchronization Active</p>
        </header>
        
        <section style="border: 1px solid #4361ee; background: rgba(67, 97, 238, 0.05); margin-bottom: 30px; padding: 20px; border-radius: 8px;">
            <h2 style="color: #4cc9f0; margin-top: 0; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase;">Broadcast Command Console</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 200px; gap: 20px;">
                <div>
                    <input type="text" id="global-msg" placeholder="Enter message for selected entities..." style="width: 100%; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid #4361ee; color: white; padding: 10px;">
                    
                    <div style="display: flex; gap: 20px; align-items: center;">
                        <label style="color: #e2e8f0; font-size: 0.8rem;">SIGNAL TYPE:</label>
                        <label style="color: #4cc9f0; cursor: pointer; font-size: 0.8rem;"><input type="radio" name="msg-type" value="blue" checked> INTEL (BLUE)</label>
                        <label style="color: #ef476f; cursor: pointer; font-size: 0.8rem;"><input type="radio" name="msg-type" value="red"> ALERT (RED)</label>
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; justify-content: center;">
                    <button class="btn-new" onclick="sendGlobalBroadcast()" style="padding: 12px; font-weight: bold;">EXECUTE BROADCAST</button>
                </div>
            </div>
        </section>

        <section id="admin-teams" style="margin-bottom: 40px; padding: 20px; background: rgba(0,0,0,0.2); border: 1px solid #333;">
            <h2 style="color: #4cc9f0; text-transform: uppercase; letter-spacing: 2px; margin-top:0;">Global Squad Oversight</h2>
            <div id="admin-team-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
                </div>
        </section>

        <div id="chat-monitor" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width: 80%; height: 80%; background: #0d1117; border: 2px solid #4cc9f0; z-index: 10000; padding: 20px; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,1);">
            <div style="display:flex; justify-content:space-between; margin-bottom: 15px;">
                <h3 id="monitor-team-name" style="color: #4cc9f0; margin:0;">INTERCEPTING FREQUENCY...</h3>
                <button onclick="closeMonitor()" style="background:none; border:1px solid #ef476f; color:#ef476f; cursor:pointer; padding: 5px 15px;">CLOSE INTERCEPT</button>
            </div>
            <div id="monitor-messages" style="flex:1; overflow-y:auto; background:rgba(0,0,0,0.3); padding:15px; font-family:monospace; border: 1px solid #222; margin-bottom: 15px;"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="admin-chat-input" placeholder="Speak as OVERSEER..." style="flex:1; background:#161b22; border:1px solid #333; color:white; padding:10px;">
                <button onclick="adminSendMessage()" style="background:#4cc9f0; color:#0d1117; border:none; padding:0 20px; font-weight:bold; cursor:pointer;">INJECT MESSAGE</button>
            </div>
        </div>

        <div class="admin-stats">
            <div class="stat-card">
                <h3>Pending Transmissions</h3>
                <span id="count-pending">0</span>
            </div>
            <div class="stat-card">
                <h3>Verified Entities</h3>
                <span id="count-verified">0</span>
            </div>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="select-all" onclick="toggleSelectAll(this)"></th>
                    <th>Identifier</th>
                    <th>Credits (₵)</th>
                    <th>Requested Class</th>
                    <th>Status</th>
                    <th>Command</th>
                </tr>
            </thead>
            <tbody id="player-list">
                </tbody>
        </table>

        <div class="button-group" style="margin-top: 40px; text-align: center;">
            <a href="index.html" class="btn btn-player">Disconnect from System</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const supabaseUrl = 'https://ijksxcqbecobagkbvghm.supabase.co';
        const supabaseKey = 'sb_publishable_Z2SYmoDOGNRe8zqAdjGymg_xHzXh1QA';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let players = [];
        let activeMonitoringTeam = null;

        // --- PLAYER & CREDIT MANAGEMENT ---

        async function fetchPlayers() {
            const { data, error } = await _supabase
                .from('players')
                .select('*')
                .order('name', { ascending: true });

            if (error) return console.error("Fetch Error:", error.message);
            players = data || [];
            renderTable();
        }

        async function updatePlayerCredits(id, newAmount) {
            const amount = parseInt(newAmount);
            if (isNaN(amount)) return;
            await _supabase.from('players').update({ credits: amount }).eq('id', id);
            // No need to fetch, realtime listener will handle UI update
        }

        function renderTable() {
    const list = document.getElementById('player-list');
    if (!list) return;

    if (players.length === 0) {
        list.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px;">No entities found in cloud database.</td></tr>`;
        updateCounters();
        return;
    }

    list.innerHTML = players.map(p => {
        // Handle ID as a string to support both old numeric IDs and new UUIDs
        const safeId = String(p.id);
        
        let actionButtons = "";
        if (p.status === "Verified" || p.status === "DECEASED") {
            actionButtons = `<button class="btn-access" onclick="accessSheet('${safeId}')">Access</button>`;
        } else {
            actionButtons = `
                <button class="approve" onclick="accessSheet('${safeId}')">Finalize</button>
                <button class="delete" onclick="purge('${safeId}')">Purge</button>
            `;
        }

        const statusClass = p.status ? p.status.toLowerCase() : 'pending';
        
        // Exactly like requestClass—if p.wish is empty, it shows the backup text
        const userClass = p.requestClass || "Unknown Class";
        const userWish = p.wish || "No wish/intel provided"; 

        return `
            <tr>
                <td><input type="checkbox" class="player-selector" value="${safeId}"></td>
                <td>
                    <strong style="color: #e2e8f0;">${p.name}</strong><br>
                    <small style="color: #4361ee; font-size: 0.6rem;">ID: ${safeId.substring(0,8)}</small>
                </td>
                <td style="max-width: 280px;">
                    <div style="margin-bottom: 4px;">
                        <span style="font-size: 0.65rem; color: #8b949e; text-transform: uppercase;">Class:</span>
                        <span style="color: #4cc9f0; font-weight: bold; margin-left: 5px;">${userClass}</span>
                    </div>
                    <div style="background: rgba(6, 214, 160, 0.05); border-left: 2px solid #06d6a0; padding: 6px; font-size: 0.8rem;">
                        <span style="font-size: 0.6rem; color: #666; display: block; text-transform: uppercase;">System Wish:</span>
                        <span style="color: #ccc; font-style: italic;">"${userWish}"</span>
                    </div>
                </td>
                <td>
                    <input type="number" value="${p.credits || 0}" 
                           onchange="updatePlayerCredits('${safeId}', this.value)" 
                           style="width: 70px; background: #000; color: #fbbf24; border: 1px solid #333; text-align: center;">
                </td>
                <td><span class="status ${statusClass}">${p.status}</span></td>
                <td>${actionButtons}</td>
            </tr>
        `;
    }).join('');

    updateCounters();
}

        // --- BROADCAST LOGIC ---

        function toggleSelectAll(source) {
            const checkboxes = document.querySelectorAll('.player-selector');
            checkboxes.forEach(cb => cb.checked = source.checked);
        }

        async function sendGlobalBroadcast() {
            const msg = document.getElementById('global-msg').value;
            const type = document.querySelector('input[name="msg-type"]:checked').value;
            const selectedCheckboxes = document.querySelectorAll('.player-selector:checked');
            
            if (!msg) return alert("Broadcast failed: Message empty.");
            if (selectedCheckboxes.length === 0) return alert("Broadcast failed: No entities selected.");

            const selectedIds = Array.from(selectedCheckboxes).map(cb => cb.value);

            for (let id of selectedIds) {
                await _supabase.from('players').update({ 
                    last_notif: msg, 
                    notif_type: type, 
                    notif_time: Date.now() 
                }).eq('id', id);
            }

            alert(`Signal transmitted to ${selectedIds.length} entities.`);
            document.getElementById('global-msg').value = "";
        }

        // --- SQUAD OVERSIGHT LOGIC ---

        async function loadAllTeams() {
            const { data: teams, error } = await _supabase.from('teams').select('*');
            if (error) return;
            const container = document.getElementById('admin-team-list');
            container.innerHTML = "";

            for (const team of teams) {
                const { data: members } = await _supabase.from('players').select('name, id').in('id', team.members);
                
                const card = document.createElement('div');
                card.className = "team-card";
                card.style = "background:#161b22; border:1px solid #333; padding:15px; border-radius:4px;";
                card.innerHTML = `
                    <h4 style="color:#4cc9f0; margin:0 0 10px 0; letter-spacing:1px;">${team.name.toUpperCase()}</h4>
                    <div style="font-size:0.8rem; color:#8b949e; margin-bottom:10px;">
                        ${(members || []).map(m => `
                            <div style="display:flex; justify-content:space-between; margin-bottom:4px; padding:2px 0; border-bottom:1px solid #222;">
                                <span>${m.name}</span>
                                <button onclick="kickPlayer(${team.id}, ${m.id})" style="color:#ef476f; background:none; border:none; font-size:0.6rem; cursor:pointer;">[KICK]</button>
                            </div>
                        `).join('')}
                    </div>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button onclick='openMonitor(${JSON.stringify(team).replace(/'/g, "&apos;")})' style="flex:1; background:#4cc9f0; color:#0d1117; border:none; padding:8px; font-weight:bold; cursor:pointer; font-size:0.7rem;">MONITOR CHAT</button>
                        <button onclick="forceDeleteTeam(${team.id})" style="background:none; border:1px solid #ef476f; color:#ef476f; padding:8px; cursor:pointer; font-size:0.7rem;">DISSOLVE</button>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        async function kickPlayer(teamId, pId) {
            if(!confirm("Forcibly remove player from squad?")) return;
            const { data } = await _supabase.from('teams').select('members').eq('id', teamId).single();
            const newList = data.members.filter(id => id != pId);
            await _supabase.from('teams').update({ members: newList }).eq('id', teamId);
            loadAllTeams();
        }

        async function forceDeleteTeam(teamId) {
            if(!confirm("DISSOLVE SQUAD? All encrypted messages will be purged.")) return;
            await _supabase.from('teams').delete().eq('id', teamId);
            loadAllTeams();
        }

        // --- CHAT MONITORING ---

        function openMonitor(team) {
            activeMonitoringTeam = team;
            document.getElementById('chat-monitor').style.display = 'flex';
            document.getElementById('monitor-team-name').innerText = "MONITORING FREQUENCY: " + team.name;
            loadMonitorHistory();
            
            _supabase.channel('admin_monitor')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'team_messages', filter: `team_id=eq.${team.id}` }, payload => {
                    appendMonitorMessage(payload.new);
                }).subscribe();
        }

        async function loadMonitorHistory() {
            const { data } = await _supabase.from('team_messages').select('*').eq('team_id', activeMonitoringTeam.id).order('created_at', { ascending: true });
            const box = document.getElementById('monitor-messages');
            box.innerHTML = '';
            if (data) data.forEach(msg => appendMonitorMessage(msg));
        }

        function appendMonitorMessage(msg) {
            const box = document.getElementById('monitor-messages');
            box.innerHTML += `<div style="margin-bottom:8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom:4px;"><b style="color:${msg.sender_name === 'SYSTEM OVERSEER' ? '#ef476f' : '#4cc9f0'};">[${msg.sender_name}]:</b> <span style="color:#ccc;">${msg.content}</span></div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function adminSendMessage() {
            const inp = document.getElementById('admin-chat-input');
            if (!inp.value.trim() || !activeMonitoringTeam) return;
            await _supabase.from('team_messages').insert({
                team_id: activeMonitoringTeam.id,
                sender_name: "SYSTEM OVERSEER",
                content: inp.value.trim()
            });
            inp.value = "";
        }

        function closeMonitor() {
            document.getElementById('chat-monitor').style.display = 'none';
            _supabase.removeAllChannels(); 
        }

        // --- SYSTEM UTILITIES ---

        function accessSheet(id) { window.location.href = `player-sheet.html?id=${id}`; }

        function updateCounters() {
            document.getElementById('count-pending').innerText = players.filter(p => p.status === "Pending").length;
            document.getElementById('count-verified').innerText = players.filter(p => p.status === "Verified").length;
        }

        async function purge(id) {
    // We convert id to string just to be 100% safe
    const safeId = String(id);
    
    if(confirm("CRITICAL: Purge this entity from the cloud forever? (Declare Deceased)")) {
        const { error } = await _supabase
            .from('players')
            .delete()
            .eq('id', safeId);

        if (error) {
            alert("Purge failed: " + error.message);
        } else {
            // fetchPlayers() will trigger a re-render
            fetchPlayers();
        }
    }
}

        // --- REAL-TIME REFRESH ---

        _supabase.channel('admin-updates')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => fetchPlayers())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'teams' }, () => loadAllTeams())
            .subscribe();

        // Initial Load
        fetchPlayers();
        loadAllTeams();

    </script>
</body>
</html>
