<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Terminal | Nexus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="death-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:99999; color:#ef476f; flex-direction:column; justify-content:center; align-items:center; text-align:center; font-family: sans-serif;">
    <h1 style="font-size: 5rem; margin:0; letter-spacing: 10px;">ELIMINATED</h1>
    <p style="font-size: 1.2rem; letter-spacing: 5px; margin-top: 20px; color: #fff;">CONNECTION TERMINATED BY OVERSEER</p>
    <p id="death-msg" style="color: #666; max-width: 500px; margin-top: 40px; font-size: 0.9rem; line-height: 1.6;">Your biological signature has been purged from the Nexus.</p>
    <button onclick="window.location.href='index.html'" style="margin-top: 50px; background:none; border:1px solid #ef476f; color:#ef476f; padding:15px 30px; cursor:pointer; text-transform: uppercase; letter-spacing: 2px;">Return to Void</button>
</div>

<div class="sheet-container">
    <header class="sheet-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 30px;">
        <div class="header-left">
            <h1 id="p-name" style="margin:0; color: #4cc9f0; font-size: 2rem;">---</h1>
            <div style="display: flex; align-items: center; gap: 15px; margin-top: 5px;">
                <span id="p-class" style="color: #8b949e; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px;">Unclassified</span>
                <span id="p-status-tag" class="status verified">HEALTHY</span>
            </div>
        </div>
        <div style="text-align: center;">
            <label style="display: block; font-size: 0.7rem; color: #8b949e;">LEVEL</label>
            <div id="p-level" style="font-size: 2.5rem; font-weight: bold; color: #4cc9f0; line-height: 1;">1</div>
        </div>
    </header>

    <div class="main-grid" style="display: grid; grid-template-columns: 200px 1fr; gap: 40px;">
        <aside class="nav-sidebar" style="display: flex; flex-direction: column; gap: 10px;">
            <button class="btn-nav active" onclick="openTab(event, 'tab-stats')">Attributes</button>
            <button class="btn-nav" onclick="openTab(event, 'tab-skills')">Skills</button>
            <button class="btn-nav" onclick="openTab(event, 'tab-inventory')">Inventory</button>
            <button class="btn-nav" onclick="openTab(event, 'tab-missions')">Missions</button>
            <div style="margin-top: auto; padding-top: 50px;">
                <button class="btn-player" onclick="logout()" style="width: 100%; opacity: 0.6;">Disconnect</button>
            </div>
        </aside>

        <div class="content-area">
            <div id="tab-stats" class="tab-content active">
                <h3 style="color: #4cc9f0; border-bottom: 1px solid rgba(76,201,240,0.2); padding-bottom: 10px;">System Attributes</h3>
                <div id="stat-sidebar" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 20px;"></div>
            </div>

            <div id="tab-skills" class="tab-content">
                <h3 style="color: #4cc9f0; border-bottom: 1px solid rgba(76,201,240,0.2); padding-bottom: 10px;">Combat Protocols</h3>
                <div id="skills-list" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;"></div>
            </div>

            <div id="tab-inventory" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(76,201,240,0.2); padding-bottom: 10px;">
                    <h3 style="color: #4cc9f0; margin:0;">Personal Storage</h3>
                </div>
                <div id="loot-list" style="display: flex; flex-direction: column; gap: 10px; margin: 20px 0;"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="new-item" placeholder="Register item..." style="flex: 1; margin-bottom: 0;">
                    <button class="btn-access" onclick="addItem()" style="width: 50px;">+</button>
                </div>
            </div>

            <div id="tab-missions" class="tab-content">
                <h3 style="color: #ffd166; border-bottom: 1px solid rgba(255,209,102,0.2); padding-bottom: 10px;">Mission Log</h3>
                <div id="mission-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px;"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 2. Initialize Connection
    const supabaseUrl = 'https://ijksxcqbecobagkbvghm.supabase.co';
    const supabaseKey = 'sb_publishable_Z2SYmoDOGNRe8zqAdjGymg_xHzXh1QA';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const urlParams = new URLSearchParams(window.location.search);
    const playerId = urlParams.get('id'); // Note: Keeping as string for cloud matching
    
    let currentPlayer = null;

    // --- CLOUD DATA FETCH ---
    async function loadPlayer() {
        const { data, error } = await _supabase
            .from('players')
            .select('*')
            .eq('id', playerId)
            .single();

        if (error || !data) {
            window.location.href = 'index.html';
            return;
        }

        if (data.status === "Pending") {
            alert("ACCESS DENIED: Awaiting Admin Verification.");
            window.location.href = 'index.html';
            return;
        }

        currentPlayer = data;
        renderEverything();
    }

    // --- REAL-TIME SUBSCRIPTION ---
    const realtimePlayer = _supabase
        .channel('any')
        .on('postgres_changes', { 
            event: 'UPDATE', 
            schema: 'public', 
            table: 'players', 
            filter: `id=eq.${playerId}` 
        }, payload => {
            console.log('Change received!', payload.new);
            currentPlayer = payload.new;
            
            // Check for death status immediately
            if (currentPlayer.status === "DECEASED") {
                document.getElementById('death-screen').style.display = 'flex';
            } else {
                renderEverything();
            }
        })
        .subscribe();

    // --- RENDER LOGIC ---
    function renderEverything() {
        if (!currentPlayer) return;

        document.getElementById('p-name').innerText = currentPlayer.name;
        document.getElementById('p-class').innerText = currentPlayer.finalClass || "Unclassified";
        document.getElementById('p-level').innerText = currentPlayer.level;
        document.getElementById('p-status-tag').innerText = currentPlayer.status || "HEALTHY";

        // Stats
        document.getElementById('stat-sidebar').innerHTML = Object.entries(currentPlayer.stats || {}).map(([k, v]) => `
            <div class="dnd-stat-box" style="padding:15px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); text-align:center;">
                <label style="text-transform: uppercase; font-size: 0.6rem; color: #8b949e; display:block; margin-bottom:5px;">${k}</label>
                <div style="font-size: 1.5rem; font-weight: bold; color: #e2e8f0;">${v}</div>
            </div>
        `).join('');

        // Missions
        const mList = document.getElementById('mission-list');
        mList.innerHTML = (currentPlayer.missions || []).length ? currentPlayer.missions.map(m => `
            <div class="mission-card" style="background:rgba(255,255,255,0.04); border-left:4px solid #ffd166; padding:15px;">
                <b style="color:#ffd166; display:block; margin-bottom:10px;">${m.name}</b>
                <div style="font-size: 0.85rem; color: #ccc;">${m.desc}</div>
                <div style="font-size: 0.75rem; color: #4cc9f0; margin-top:10px;">Reward: ${m.rp}</div>
            </div>
        `).join('') : '<p style="color:#4a4a4a;">No active objectives.</p>';

        // Skills
        const sList = document.getElementById('skills-list');
        sList.innerHTML = (currentPlayer.skills || []).length ? currentPlayer.skills.map(s => `
            <div class="item-row" style="background:rgba(255,255,255,0.03); border-left:3px solid #4cc9f0; padding:15px;">
                <div style="display:flex; justify-content:space-between;">
                    <b style="color:#4cc9f0;">${s.name}</b>
                    <span style="color:#ef476f;">${s.dmg}</span>
                </div>
                <div style="font-size: 0.85rem; color:#8b949e;">${s.desc}</div>
            </div>
        `).join('') : '<p style="color:#4a4a4a;">No skills authorized.</p>';

        // Inventory
        renderLoot();
    }

    function renderLoot() {
        const lootArr = currentPlayer.inventory ? currentPlayer.inventory.split(',').filter(i => i.trim() !== "") : [];
        const list = document.getElementById('loot-list');
        list.innerHTML = lootArr.map((item, i) => `
            <div class="item-row" style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); padding:10px 15px;">
                <span style="color:#e2e8f0;">${item}</span>
                <span style="color:#ef476f; cursor:pointer; font-weight:bold;" onclick="removeItem(${i})">×</span>
            </div>
        `).join('');
    }

    // --- ACTIONS ---
    async function addItem() {
        const input = document.getElementById('new-item');
        if (!input.value.trim()) return;

        let lootArr = currentPlayer.inventory ? currentPlayer.inventory.split(',').filter(i => i.trim() !== "") : [];
        lootArr.push(input.value.trim());
        const updatedInventory = lootArr.join(', ');

        const { error } = await _supabase
            .from('players')
            .update({ inventory: updatedInventory })
            .eq('id', playerId);

        if (!error) {
            input.value = "";
            // UI will update automatically via Realtime Subscription
        }
    }

    async function removeItem(index) {
        let lootArr = currentPlayer.inventory.split(',').filter(i => i.trim() !== "");
        lootArr.splice(index, 1);
        const updatedInventory = lootArr.join(', ');

        await _supabase
            .from('players')
            .update({ inventory: updatedInventory })
            .eq('id', playerId);
    }

    function openTab(evt, tabName) {
        const contents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < contents.length; i++) { contents[i].classList.remove("active"); }
        const buttons = document.getElementsByClassName("btn-nav");
        for (let i = 0; i < buttons.length; i++) { buttons[i].classList.remove("active"); }
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function logout() { window.location.href = 'index.html'; }

    // Start
    loadPlayer();
</script>
</body>
</html>
