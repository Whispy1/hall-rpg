<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Terminal | Nexus</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .nav-sidebar { display: flex; flex-direction: column; gap: 8px; }
        .btn-nav {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            color: #8b949e;
            padding: 12px 20px;
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-nav:hover { background: rgba(76, 201, 240, 0.1); border-color: #4cc9f0; }
        .btn-nav.active {
            background: #4361ee !important;
            color: white !important;
            border-color: #4361ee !important;
            box-shadow: 0 0 15px rgba(67, 97, 238, 0.3);
        }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        input, textarea { background: #0d1117; border: 1px solid #333; color: white; padding: 10px; border-radius: 4px; }
        .skill-card, .mission-card, .loot-card { background: rgba(255,255,255,0.02); border: 1px solid #222; padding: 15px; border-radius: 8px; margin-bottom: 12px; position: relative; }
        #chat-messages { height: 350px; overflow-y: auto; background: #0d1117; padding: 15px; border: 1px solid #222; margin-bottom: 10px; font-family: monospace; border-radius: 8px; }
    </style>
</head>
<body>

<div id="loot-modal" class="modal-overlay">
    <div style="background:#161b22; border: 2px solid #ffd166; padding:25px; width:90%; max-width:400px; border-radius:12px;">
        <h3 style="color:#ffd166; margin:0 0 15px 0;">ACQUIRE ITEM</h3>
        <input type="text" id="loot-input-name" placeholder="Item Name..." style="width:100%; margin-bottom:10px;">
        <textarea id="loot-input-effect" placeholder="Effect or description..." style="width:100%; height:80px; resize:none; margin-bottom:10px;"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="closeLootModal()" style="flex:1; background:none; border:1px solid #444; color:#8b949e; cursor:pointer;">CANCEL</button>
            <button onclick="saveLootItem()" style="flex:2; background:#ffd166; color:#0d1117; font-weight:bold; border:none; cursor:pointer; padding:10px;">ADD TO PACK</button>
        </div>
    </div>
</div>

<div id="credit-modal" class="modal-overlay">
    <div style="background:#161b22; border: 2px solid #ffd166; padding:25px; width:90%; max-width:400px; border-radius:12px;">
        <h3 style="color:#ffd166; margin:0 0 15px 0;">WIRE TRANSFER</h3>
        <input type="text" id="trade-target-id" placeholder="Recipient Player ID..." style="width:100%; margin-bottom:10px;">
        <input type="number" id="trade-amount" placeholder="Amount ₵" style="width:100%;">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeCreditModal()" style="flex:1; background:none; border:1px solid #444; color:#8b949e; cursor:pointer;">CANCEL</button>
            <button onclick="confirmCreditTrade()" style="flex:2; background:#ffd166; color:#0d1117; font-weight:bold; border:none; cursor:pointer; padding:10px;">AUTHORIZE</button>
        </div>
    </div>
</div>

<div id="note-modal" class="modal-overlay">
    <div style="background:#161b22; border: 2px solid #4cc9f0; padding:25px; width:90%; max-width:500px; border-radius:12px;">
        <h3 id="note-modal-title" style="color:#4cc9f0; margin:0 0 15px 0;">CHRONICLE ENTRY</h3>
        <input type="text" id="note-input-title" placeholder="Title..." style="width:100%; margin-bottom:10px;">
        <textarea id="note-input-content" style="width:100%; height:250px; resize:none;"></textarea>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="closeNoteModal()" style="flex:1; background:none; border:1px solid #444; color:#8b949e; cursor:pointer;">CLOSE</button>
            <button onclick="saveNoteEntry()" style="flex:2; background:#4cc9f0; color:#0d1117; font-weight:bold; border:none; cursor:pointer; padding:10px;">SYNC DATA</button>
        </div>
    </div>
</div>

<div class="sheet-container" style="max-width: 1000px; margin: auto; padding: 40px;">
    <header style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #222;">
        <div>
            <h1 id="p-name" style="margin:0; font-size: 3rem; color: #4cc9f0;">---</h1>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                <span id="p-class" style="color: #8b949e; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">NONE</span>
                <button onclick="copyMyID()" style="background: #1a1f26; color: #8b949e; border: 1px solid #333; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer;">COPY ID</button>
            </div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 2.2rem; font-family: monospace; font-weight: bold;">
                <input type="number" id="hp-input" onchange="updateHP(this.value)" style="width: 85px; background:none; border:none; color:#06d6a0; text-align:right; font-weight:bold; outline:none; font-size: 2.2rem; padding:0;">
                <span style="color:#444; margin: 0 5px;">/</span><span id="hp-max-display" style="color:#ef476f;">200</span>
            </div>
            <label style="color: #8b949e; font-size: 0.75rem; letter-spacing: 2px;">VITALITY | LVL <span id="p-level">1</span></label>
        </div>
    </header>

    <div style="display: grid; grid-template-columns: 240px 1fr; gap: 40px;">
        <aside class="nav-sidebar">
            <button id="nav-stats" class="btn-nav active" onclick="openTab(event, 'tab-stats')">Attributes</button>
            <button id="nav-skills" class="btn-nav" onclick="openTab(event, 'tab-skills')">Skills</button>
            <button id="nav-inventory" class="btn-nav" onclick="openTab(event, 'tab-inventory')">Inventory</button>
            <button id="nav-chronicles" class="btn-nav" onclick="openTab(event, 'tab-chronicles')">Chronicles</button>
            <button id="nav-missions" class="btn-nav" onclick="openTab(event, 'tab-missions')">Missions</button>
            <button id="nav-team" class="btn-nav" onclick="openTab(event, 'tab-team')">Hall Team</button>
            <button onclick="logout()" style="margin-top:40px; background: #161b22; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;">Disconnect</button>
        </aside>

        <main>
            <div id="tab-stats" class="tab-content">
                <div id="stat-sidebar" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px;"></div>
            </div>

            <div id="tab-skills" class="tab-content" style="display:none;">
                <h3 style="color:#4cc9f0; margin-bottom: 20px;">COMBAT PROTOCOLS</h3>
                <div id="skills-list"></div>
            </div>

            <div id="tab-inventory" class="tab-content" style="display:none;">
                <div style="background:#1a1f26; padding:20px; border:1px solid #ffd166; display:flex; justify-content:space-between; align-items:center; border-radius:8px; margin-bottom:25px;">
                    <div><small style="color:#ffd166; font-weight: bold;">NEXUS CREDITS</small><div id="p-credits" style="font-size:2rem; font-family:monospace; color:white;">0 ₵</div></div>
                    <button onclick="openCreditModal()" style="background:#ffd166; color:#0d1117; border:none; padding:12px 20px; font-weight:bold; cursor:pointer; border-radius:4px;">TRANSFER</button>
                </div>
                <button onclick="openLootModal()" style="width:100%; background:none; border:1px dashed #ffd166; color:#ffd166; padding:15px; margin-bottom:20px; cursor:pointer; border-radius:8px; font-weight:bold;">+ REGISTER NEW LOOT</button>
                <div id="loot-list"></div>
            </div>

            <div id="tab-chronicles" class="tab-content" style="display:none;">
                <button onclick="openNoteModal()" style="width:100%; background:#4cc9f0; color:#0d1117; border:none; padding:15px; font-weight:bold; margin-bottom:20px; cursor:pointer; border-radius:8px;">+ CREATE LOG ENTRY</button>
                <div id="notes-list"></div>
            </div>

            <div id="tab-missions" class="tab-content" style="display:none;">
                <h3 style="color:#ef476f; margin-bottom: 20px;">ACTIVE DIRECTIVES</h3>
                <div id="mission-list"></div>
            </div>

            <div id="tab-team" class="tab-content" style="display:none;">
                <div id="team-lobby">
                    <h3 style="color:#4cc9f0;">INITIALIZE SQUAD</h3>
                    <input type="text" id="new-team-name" placeholder="Team Name..." style="width:100%; margin: 15px 0; padding:15px;">
                    <button onclick="createTeam()" style="width:100%; background:#4cc9f0; color:#0d1117; padding:15px; border:none; font-weight:bold; cursor:pointer;">CREATE TEAM</button>
                </div>
                <div id="team-dashboard" style="display:none;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h2 id="display-team-name" style="color:#4cc9f0; margin:0;">SQUAD</h2>
                        <div id="team-members-list"></div>
                    </div>
                    <div id="leader-tools" class="leader-zone">
                        <small style="color:#4cc9f0; font-weight:bold; text-transform:uppercase;">Recruitment Console</small>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <input type="text" id="invite-player-id" placeholder="Paste Player ID..." style="flex:1;">
                            <button onclick="invitePlayer()" style="background:#4cc9f0; color:#0d1117; border:none; padding:0 25px; font-weight:bold; cursor:pointer;">INVITE</button>
                        </div>
                    </div>
                    <div id="chat-messages"></div>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="chat-input" placeholder="Enter secure comms..." style="flex:1; padding:15px;">
                        <button onclick="sendMessage()" style="background:#4cc9f0; color:#0d1117; border:none; padding:0 30px; font-weight:bold; cursor:pointer;">SEND</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseUrl = 'https://ijksxcqbecobagkbvghm.supabase.co';
    const supabaseKey = 'sb_publishable_Z2SYmoDOGNRe8zqAdjGymg_xHzXh1QA';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const urlParams = new URLSearchParams(window.location.search);
    const playerId = urlParams.get('id'); 
    let currentPlayer = null;
    let lastProcessedNotifTime = 0; 
    let playerSubscription = null;
    let currentTeam = null;

    // --- DEATH & TERMINATION PROTOCOL ---
function subscribeToTermination() {
    _supabase
        .channel('death_watch')
        .on('postgres_changes', { 
            event: '*', // Listen for DELETES or UPDATES
            schema: 'public', 
            table: 'players', 
            filter: `id=eq.${playerId}` 
        }, payload => {
            // If the player is deleted from DB OR a status field is set to 'dead'
            if (payload.eventType === 'DELETE' || (payload.new && payload.new.status === 'TERMINATED')) {
                triggerDeathSequence();
            }
        })
        .subscribe();
}

function triggerDeathSequence() {
    // 1. Visual Effect
    document.body.innerHTML = `
        <div style="background:black; color:red; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:monospace; text-align:center; padding:20px;">
            <h1 style="font-size:3rem; text-shadow: 0 0 20px red;">[ CRITICAL FAILURE ]</h1>
            <p style="font-size:1.5rem; letter-spacing:5px;">BIOMETRIC SIGNALS LOST</p>
            <div id="death-timer" style="margin-top:40px; color:#444;">RE-ROUTING TO VOID IN 5...</div>
        </div>
    `;

    // 2. Play a low-frequency alert sound
    const audio = new AudioContext();
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(100, audio.currentTime);
    osc.connect(gain);
    gain.connect(audio.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 2);

    // 3. Countdown to Index
    let count = 5;
    const interval = setInterval(() => {
        count--;
        document.getElementById('death-timer').innerText = `RE-ROUTING TO VOID IN ${count}...`;
        if (count <= 0) {
            clearInterval(interval);
            window.location.href = 'index.html';
        }
    }, 1000);
}


    async function loadPlayer() {
    if (!playerId) return;

    const { data, error } = await _supabase
        .from('players')
        .select('*')
        .eq('id', playerId)
        .single();

    if (data) {
        currentPlayer = data;
        renderEverything();
        applyPermissions(data.permissions);
        checkTeamStatus();
        
        // INITIALIZE REAL-TIME STREAMS
        subscribeToPlayerData();
        subscribeToTermination(); // <--- ADD THIS LINE
    } else {
        // If player enters an ID that doesn't exist (already dead/deleted)
        window.location.href = 'index.html';
    }
}

    function subscribeToPlayerData() {
        if (playerSubscription) _supabase.removeChannel(playerSubscription);
        playerSubscription = _supabase.channel('player_realtime_sync').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'players', filter: `id=eq.${playerId}` }, payload => {
            const newData = payload.new;
            if (newData.last_notif && newData.notif_time > lastProcessedNotifTime) {
                lastProcessedNotifTime = newData.notif_time;
                showBroadcastPopup(newData.last_notif, newData.notif_type);
            }
            currentPlayer = newData;
            renderEverything();
        }).subscribe();
    }

    function applyPermissions(perms) {
        if (!perms) return;
        ['stats', 'skills', 'inventory', 'chronicles', 'missions', 'team'].forEach(k => {
            const btn = document.getElementById(`nav-${k}`);
            if (btn) btn.style.display = (perms[k] === false) ? 'none' : 'block';
        });
    }

    function renderEverything() {
        document.getElementById('p-name').innerText = currentPlayer.name;
        document.getElementById('p-class').innerText = currentPlayer.finalClass || "NONE";
        document.getElementById('p-level').innerText = currentPlayer.level || 1;
        document.getElementById('hp-input').value = currentPlayer.hp_cur || 0;
        document.getElementById('hp-max-display').innerText = currentPlayer.hp_max || 100;
        document.getElementById('p-credits').innerText = (currentPlayer.credits || 0).toLocaleString() + " ₵";

        // Stats
        document.getElementById('stat-sidebar').innerHTML = Object.entries(currentPlayer.stats || {}).map(([k,v]) => `
            <div style="background:#161b22; padding:20px; border:1px solid #222; text-align:center; border-radius:8px;">
                <small style="color:#8b949e; text-transform:uppercase; letter-spacing:1px; font-size:0.8rem;">${k}</small>
                <div style="font-weight:bold; color:#4cc9f0; font-size:1.8rem; margin-top:5px;">${v}</div>
            </div>`).join('');

        // Skills
        document.getElementById('skills-list').innerHTML = (currentPlayer.skills || []).map(s => `
            <div class="skill-card">
                <b style="color:#4cc9f0; font-size:1.1rem;">${s.name}</b>
                <p style="margin:8px 0 0; font-size:0.9rem; color:#ccc; line-height:1.4;">${s.desc}</p>
            </div>`).join('');

        // FIXED: Inventory Rendering
        document.getElementById('loot-list').innerHTML = (currentPlayer.inventory || []).map((l, i) => `
            <div class="loot-card">
                <div style="display:flex; justify-content:space-between;">
                    <b style="color:#ffd166; font-size:1.1rem;">${l.name}</b>
                    <span onclick="removeItem(${i})" style="color:#ef476f; cursor:pointer; font-weight:bold;">DISCARD</span>
                </div>
                <p style="margin:8px 0 0; font-size:0.9rem; color:#8b949e;">${l.effect || 'No special effects.'}</p>
            </div>`).join('');

        // Missions
        document.getElementById('mission-list').innerHTML = (currentPlayer.missions || []).map(m => `
            <div class="mission-card">
                <div class="mission-header" style="color:#4cc9f0; font-weight:bold; border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:10px;">${m.title}</div>
                <div class="mission-desc" style="font-size:0.9rem; margin-bottom:15px;">${m.desc}</div>
                <div style="display:flex; gap:20px; font-size:0.7rem; font-family:monospace;">
                    <div><span style="color:#06d6a0;">REWARD:</span> ${m.reward || 'REDACTED'}</div>
                    <div><span style="color:#ef476f;">PENALTY:</span> ${m.penalty || 'REDACTED'}</div>
                </div>
            </div>`).join('');

        // Notes
        document.getElementById('notes-list').innerHTML = (currentPlayer.notes || []).map((n, i) => `
            <div onclick="openNoteModal(${i})" style="background:rgba(255,255,255,0.03); border:1px solid #222; padding:15px; border-radius:8px; margin-bottom:10px; cursor:pointer;">
                <b style="color:#4cc9f0;">${n.title}</b><br>
                <small style="color:#555;">${n.timestamp || ''}</small>
            </div>`).join('');
    }

    // --- LOOT LOGIC ---
    function openLootModal() { document.getElementById('loot-modal').style.display='flex'; }
    function closeLootModal() { document.getElementById('loot-modal').style.display='none'; }
    
    async function saveLootItem() {
        const name = document.getElementById('loot-input-name').value;
        const effect = document.getElementById('loot-input-effect').value;
        if(!name) return;
        
        let inv = [...(currentPlayer.inventory || [])];
        inv.unshift({ name, effect });
        
        const { error } = await _supabase.from('players').update({ inventory: inv }).eq('id', playerId);
        if(!error) {
            closeLootModal();
            document.getElementById('loot-input-name').value = "";
            document.getElementById('loot-input-effect').value = "";
        }
    }

    async function removeItem(index) {
        if(!confirm("Destroy this item?")) return;
        let inv = [...currentPlayer.inventory];
        inv.splice(index, 1);
        await _supabase.from('players').update({ inventory: inv }).eq('id', playerId);
    }

    // --- HP & UTILS ---
    async function updateHP(v) {
        let newHP = parseInt(v);
        const maxHP = currentPlayer.hp_max || 100;
        if (newHP > maxHP) newHP = maxHP;
        if (newHP < 0) newHP = 0;
        await _supabase.from('players').update({ hp_cur: newHP }).eq('id', playerId);
    }

    function openTab(e, n) {
        document.querySelectorAll('.tab-content').forEach(x=>x.style.display='none');
        document.querySelectorAll('.btn-nav').forEach(x=>x.classList.remove('active'));
        document.getElementById(n).style.display='block'; e.currentTarget.classList.add('active');
    }

    function logout(){ window.location.href='index.html'; }
    function copyMyID(){ navigator.clipboard.writeText(playerId); alert("ID Copied"); }

    // --- TEAM SYSTEM ---
    async function checkTeamStatus() {
        const { data } = await _supabase.from('teams').select('*').contains('members', [playerId]);
        if (data && data.length > 0) {
            currentTeam = data[0];
            document.getElementById('team-lobby').style.display = 'none';
            document.getElementById('team-dashboard').style.display = 'block';
            document.getElementById('display-team-name').innerText = currentTeam.name;
            if (String(currentTeam.owner_id) === String(playerId)) {
                document.getElementById('leader-tools').style.display = 'block';
            }
            fetchMembers();
            subscribeChat();
        }
    }

    async function fetchMembers() {
        const { data } = await _supabase.from('players').select('name').in('id', currentTeam.members);
        document.getElementById('team-members-list').innerHTML = data.map(m => `<span class="member-badge" style="border: 1px solid #4cc9f0; padding: 2px 8px; margin-left: 5px; font-size: 0.7rem; color: #4cc9f0;">${m.name}</span>`).join('');
    }

    function subscribeChat() {
        _supabase.channel('tc').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'team_messages', filter: `team_id=eq.${currentTeam.id}` }, p => appendMsg(p.new)).subscribe();
        _supabase.from('team_messages').select('*').eq('team_id', currentTeam.id).order('created_at').then(({data}) => data && data.forEach(appendMsg));
    }
    function appendMsg(m) {
        const box = document.getElementById('chat-messages');
        box.innerHTML += `<div><b style="color:#4cc9f0;">${m.sender_name}:</b> ${m.content}</div>`;
        box.scrollTop = box.scrollHeight;
    }
    async function sendMessage() {
        const inp = document.getElementById('chat-input');
        if(!inp.value) return;
        await _supabase.from('team_messages').insert({ team_id: currentTeam.id, sender_name: currentPlayer.name, content: inp.value });
        inp.value = "";
    }

    // --- NOTIFICATIONS ---
    function showBroadcastPopup(text, type) {
        const alertDiv = document.createElement('div');
        const color = type === 'red' ? '#ef476f' : '#4cc9f0';
        alertDiv.style = `position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 600px; background: #0d1117; border: 2px solid ${color}; color: white; padding: 20px; z-index: 10001; border-radius: 8px; box-shadow: 0 0 30px ${color}55; font-family: monospace; text-align: center;`;
        alertDiv.innerHTML = `<div style="color:${color}; font-weight:bold; margin-bottom:10px;">[ INCOMING ]</div><div>${text}</div><button onclick="this.parentElement.remove()" style="margin-top:15px; background:${color}; color:black; border:none; padding:5px 15px; font-weight:bold; cursor:pointer;">ACKNOWLEDGE</button>`;
        document.body.appendChild(alertDiv);
    }

    // --- CHRONICLES ---
    let editingNoteIndex = null;
    function openNoteModal(i=null) {
        editingNoteIndex = i; document.getElementById('note-modal').style.display='flex';
        if(i!==null){
            document.getElementById('note-input-title').value = currentPlayer.notes[i].title;
            document.getElementById('note-input-content').value = currentPlayer.notes[i].content;
        } else {
            document.getElementById('note-input-title').value = ""; document.getElementById('note-input-content').value = "";
        }
    }
    function closeNoteModal(){ document.getElementById('note-modal').style.display='none'; }
    async function saveNoteEntry() {
        const t = document.getElementById('note-input-title').value;
        const c = document.getElementById('note-input-content').value;
        let notes = [...(currentPlayer.notes || [])];
        const entry = { title:t, content:c, timestamp: new Date().toLocaleString() };
        if(editingNoteIndex !== null) notes[editingNoteIndex] = entry;
        else notes.unshift(entry);
        await _supabase.from('players').update({ notes }).eq('id', playerId);
        closeNoteModal();
    }

    loadPlayer();
</script>
</body>
</html>
