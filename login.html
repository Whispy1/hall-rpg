<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login | Nexus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="welcome-container">
        <header>
            <h1>System Login</h1>
            <p>Identify yourself to gain access.</p>
        </header>
        
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="login-name" placeholder="Display Name" required autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="login-pass" placeholder="Password" required autocomplete="current-password">
            </div>
            
            <div class="button-group" style="margin-top: 20px;">
                <button type="submit" id="btn-authorize" class="btn btn-new">Authorize</button>
                <a href="index.html" class="btn btn-player">Back</a>
            </div>
        </form>
        
        <p id="login-error" style="color: #ef476f; display: none; margin-top: 15px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">
            Invalid Credentials. Access Denied.
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="login-logic.js"></script>
</body>
</html>
